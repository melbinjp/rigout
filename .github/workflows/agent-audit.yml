name: Agent Lifecycle Audit

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  agent-audit:
    name: Agent Connection Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run Agent Audit
        run: |
          # The script returns 0 on success, 1 on failure
          python scripts/agent_audit.py
